<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <link rel="icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&amp;family=DM+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

<body>
  <header class="premium-nav"></header>
  <nav class="breadcrumb-bar dj-login-breadcrumb" aria-label="Breadcrumb"><a href="index.html">Home</a><span>›</span><strong>DJ Login</strong></nav>
  <main class="page-shell">
    <section class="auth-card dj-login-card">
      <h1>DJ Login</h1>
      <p class="subcopy">Use the email address from your approved DJ application and the password you created from your secure invitation.</p>
      <p class="dj-need-access">Need access? <a class="text-link" href="dj-access.html">Request DJ Access</a>.</p>
      <form id="djLoginForm" class="form-stack">
        <label>Email<input name="email" type="email" autocomplete="username" required></label>
        <label>Password<input name="password" type="password" autocomplete="current-password" required></label>
        <div class="dj-login-actions">
          <button id="forgotDjPassword" class="button ghost" type="button">Forgot Password?</button>
          <button class="button primary" type="submit">Open Promo Crate</button>
        </div>
        <p id="djLoginStatus" class="status-message"></p>
      </form>
    </section>
  </main>
  <script type="module" src="dj-login.js"></script>
  <script src="site-nav.js"></script>
</body>
</html>
